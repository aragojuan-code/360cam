<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>360Cam - NaoJaguar</title>

  <style>
    :root {
      --bg: #0f141b;
      --panel: rgba(15, 20, 27, 0.82);
      --text: #f3f7fb;
      --muted: #9aa7b3;
      --accent: #4df0c8;
      --danger: #ff5c7a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #05070a;
      overflow: hidden;
    }

    video,
    #viewer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    #viewer {
      display: none;
    }

    #hud {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 10;
      padding: 14px;
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }

    #title {
      font-weight: 800;
      font-size: 17px;
      margin-bottom: 4px;
    }

    #status {
      font-size: 14px;
      line-height: 1.35;
      color: var(--muted);
    }

    #controls {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 15px 12px;
      font-size: 15px;
      font-weight: 800;
      color: #06110f;
      background: var(--accent);
      cursor: pointer;
    }

    button.secondary {
      background: #263241;
      color: var(--text);
    }

    button.danger {
      background: var(--danger);
      color: white;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #captureRing {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 180px;
      height: 180px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 3px solid rgba(77, 240, 200, 0.75);
      box-shadow:
        0 0 30px rgba(77, 240, 200, 0.35),
        inset 0 0 30px rgba(77, 240, 200, 0.15);
      z-index: 5;
      pointer-events: none;
    }

    #captureRing::before,
    #captureRing::after {
      content: "";
      position: absolute;
      background: rgba(77, 240, 200, 0.9);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    #captureRing::before {
      width: 2px;
      height: 54px;
    }

    #captureRing::after {
      width: 54px;
      height: 2px;
    }

    #thumb {
      position: absolute;
      right: 14px;
      bottom: 112px;
      width: 128px;
      height: 64px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.18);
      z-index: 9;
      background: #111;
      display: none;
    }

    #thumb canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    canvas.hiddenCanvas {
      display: none;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="app">
    <video id="video" autoplay playsinline muted></video>

    <div id="viewer"></div>

    <div id="captureRing"></div>

    <div id="hud">
      <div id="title">360Cam</div>
      <div id="status">
        Pulsa “Cámara”. Después apunta a una escena y pulsa “Capturar”.
      </div>
    </div>

    <div id="thumb">
      <canvas id="thumbCanvas" width="512" height="256"></canvas>
    </div>

    <div id="controls">
      <button id="cameraBtn">Cámara</button>
      <button id="captureBtn" class="secondary" disabled>Capturar</button>
      <button id="sphereBtn" class="secondary" disabled>Crear esfera</button>
      <button id="resetBtn" class="danger">Reiniciar</button>
    </div>

    <canvas id="photoCanvas" class="hiddenCanvas"></canvas>
    <canvas id="panoCanvas" class="hiddenCanvas" width="2048" height="1024"></canvas>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const video = document.getElementById("video");
    const viewer = document.getElementById("viewer");
    const statusEl = document.getElementById("status");

    const cameraBtn = document.getElementById("cameraBtn");
    const captureBtn = document.getElementById("captureBtn");
    const sphereBtn = document.getElementById("sphereBtn");
    const resetBtn = document.getElementById("resetBtn");

    const captureRing = document.getElementById("captureRing");
    const thumb = document.getElementById("thumb");

    const photoCanvas = document.getElementById("photoCanvas");
    const photoCtx = photoCanvas.getContext("2d");

    const panoCanvas = document.getElementById("panoCanvas");
    const panoCtx = panoCanvas.getContext("2d");

    const thumbCanvas = document.getElementById("thumbCanvas");
    const thumbCtx = thumbCanvas.getContext("2d");

    let stream = null;
    let renderer = null;
    let scene = null;
    let camera3d = null;
    let controls = null;
    let animationId = null;
    let texture = null;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        cameraBtn.disabled = true;
        captureBtn.disabled = false;

        setStatus("Cámara activa. Apunta a una escena amplia y pulsa “Capturar”.");
      } catch (error) {
        console.error(error);
        setStatus("No se pudo abrir la cámara. Revisa permisos y usa HTTPS.");
      }
    }

    function capturePhoto() {
      if (!video.videoWidth || !video.videoHeight) {
        setStatus("La cámara todavía no está lista. Espera un segundo.");
        return;
      }

      photoCanvas.width = video.videoWidth;
      photoCanvas.height = video.videoHeight;

      photoCtx.drawImage(video, 0, 0, photoCanvas.width, photoCanvas.height);

      createFakePanoramaFromPhoto();

      thumb.style.display = "block";
      thumbCtx.drawImage(panoCanvas, 0, 0, thumbCanvas.width, thumbCanvas.height);

      sphereBtn.disabled = false;

      setStatus("Foto capturada. Ahora pulsa “Crear esfera”.");
    }

    function createFakePanoramaFromPhoto() {
      const W = panoCanvas.width;
      const H = panoCanvas.height;

      panoCtx.fillStyle = "#05070a";
      panoCtx.fillRect(0, 0, W, H);

      const imgW = photoCanvas.width;
      const imgH = photoCanvas.height;

      const stripCount = 8;
      const stripW = W / stripCount;

      for (let i = 0; i < stripCount; i++) {
        const sx = (i / stripCount) * imgW;
        const sw = imgW / stripCount;

        panoCtx.drawImage(
          photoCanvas,
          sx, 0, sw, imgH,
          i * stripW, H * 0.18, stripW + 2, H * 0.64
        );
      }

      const topGradient = panoCtx.createLinearGradient(0, 0, 0, H * 0.28);
      topGradient.addColorStop(0, "rgba(5,7,10,0.95)");
      topGradient.addColorStop(1, "rgba(5,7,10,0)");

      panoCtx.fillStyle = topGradient;
      panoCtx.fillRect(0, 0, W, H * 0.3);

      const bottomGradient = panoCtx.createLinearGradient(0, H * 0.72, 0, H);
      bottomGradient.addColorStop(0, "rgba(5,7,10,0)");
      bottomGradient.addColorStop(1, "rgba(5,7,10,0.95)");

      panoCtx.fillStyle = bottomGradient;
      panoCtx.fillRect(0, H * 0.7, W, H * 0.3);

      panoCtx.strokeStyle = "rgba(77, 240, 200, 0.22)";
      panoCtx.lineWidth = 2;

      for (let x = 0; x <= W; x += W / 12) {
        panoCtx.beginPath();
        panoCtx.moveTo(x, 0);
        panoCtx.lineTo(x, H);
        panoCtx.stroke();
      }

      for (let y = 0; y <= H; y += H / 6) {
        panoCtx.beginPath();
        panoCtx.moveTo(0, y);
        panoCtx.lineTo(W, y);
        panoCtx.stroke();
      }
    }

    function createSphere() {
      disposeViewer();

      video.style.display = "none";
      viewer.style.display = "block";
      captureRing.classList.add("hidden");

      setStatus("Esfera creada. Arrastra con el dedo para girarla.");

      scene = new THREE.Scene();

      camera3d = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      camera3d.position.set(0, 0, 0.1);

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false
      });

      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      viewer.innerHTML = "";
      viewer.appendChild(renderer.domElement);

      texture = new THREE.CanvasTexture(panoCanvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.needsUpdate = true;

      const geometry = new THREE.SphereGeometry(50, 96, 48);
      geometry.scale(-1, 1, 1);

      const material = new THREE.MeshBasicMaterial({
        map: texture
      });

      const sphere = new THREE.Mesh(geometry, material);
      scene.add(sphere);

      controls = new OrbitControls(camera3d, renderer.domElement);
      controls.enableZoom = false;
      controls.enablePan = false;
      controls.rotateSpeed = -0.45;
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;

      animate();

      window.addEventListener("resize", onResize);

      captureBtn.disabled = true;
      sphereBtn.disabled = true;
    }

    function animate() {
      animationId = requestAnimationFrame(animate);

      if (controls) controls.update();
      if (renderer && scene && camera3d) {
        renderer.render(scene, camera3d);
      }
    }

    function onResize() {
      if (!renderer || !camera3d) return;

      camera3d.aspect = window.innerWidth / window.innerHeight;
      camera3d.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function disposeViewer() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      window.removeEventListener("resize", onResize);

      if (texture) {
        texture.dispose();
        texture = null;
      }

      if (renderer) {
        renderer.dispose();
        renderer = null;
      }

      viewer.innerHTML = "";

      scene = null;
      camera3d = null;
      controls = null;
    }

    function resetApp() {
      disposeViewer();

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      video.style.display = "block";
      viewer.style.display = "none";
      captureRing.classList.remove("hidden");
      thumb.style.display = "none";

      cameraBtn.disabled = false;
      captureBtn.disabled = true;
      sphereBtn.disabled = true;

      panoCtx.clearRect(0, 0, panoCanvas.width, panoCanvas.height);

      setStatus("Pulsa “Cámara”. Después apunta a una escena y pulsa “Capturar”.");
    }

    cameraBtn.addEventListener("click", startCamera);
    captureBtn.addEventListener("click", capturePhoto);
    sphereBtn.addEventListener("click", createSphere);
    resetBtn.addEventListener("click", resetApp);
  </script>
</body>
</html>
