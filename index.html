<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>360Cam - NaoJaguar</title>

  <style>
    :root {
      --bg: #0f141b;
      --panel: rgba(15, 20, 27, 0.86);
      --text: #f3f7fb;
      --muted: #9aa7b3;
      --accent: #4df0c8;
      --yellow: #ffd166;
      --danger: #ff5c7a;
      --soft: #263241;
      --bad: #3a4655;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #05070a;
      overflow: hidden;
    }

    video,
    #viewer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    #viewer {
      display: none;
      background: radial-gradient(circle at center, #16212c 0%, #05070a 68%);
    }

    #hud {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 20;
      padding: 14px;
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }

    #titleRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }

    #title {
      font-weight: 850;
      font-size: 17px;
    }

    #counter {
      font-size: 13px;
      font-weight: 850;
      color: var(--accent);
      background: rgba(77, 240, 200, 0.1);
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    #status {
      font-size: 14px;
      line-height: 1.35;
      color: var(--muted);
    }

    #step {
      margin-top: 8px;
      font-size: 15px;
      font-weight: 850;
      color: var(--accent);
      word-break: break-word;
      user-select: text;
      -webkit-user-select: text;
    }

    #metrics {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    #aimLayer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: none;
    }

    #targetRing {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 116px;
      height: 116px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 3px solid rgba(77, 240, 200, 0.75);
      box-shadow:
        0 0 30px rgba(77, 240, 200, 0.25),
        inset 0 0 24px rgba(77, 240, 200, 0.14);
    }

    #targetRing::before,
    #targetRing::after {
      content: "";
      position: absolute;
      background: rgba(77, 240, 200, 0.9);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    #targetRing::before {
      width: 2px;
      height: 38px;
    }

    #targetRing::after {
      width: 38px;
      height: 2px;
    }

    #currentDot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 26px;
      height: 26px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(255, 209, 102, 0.92);
      border: 2px solid white;
      box-shadow: 0 0 20px rgba(255, 209, 102, 0.55);
    }

    #arrowGuide {
      position: absolute;
      left: 50%;
      top: calc(50% + 92px);
      transform: translateX(-50%);
      padding: 10px 14px;
      min-width: 220px;
      text-align: center;
      border-radius: 999px;
      background: rgba(15, 20, 27, 0.78);
      backdrop-filter: blur(10px);
      color: white;
      font-weight: 850;
      font-size: 15px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.28);
    }

    #progressMap {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 112px;
      z-index: 18;
      padding: 10px;
      border-radius: 16px;
      background: rgba(15, 20, 27, 0.72);
      backdrop-filter: blur(12px);
      display: none;
    }

    #dots {
      display: grid;
      grid-template-columns: repeat(13, 1fr);
      gap: 6px;
    }

    .dot {
      height: 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .dot.done {
      background: rgba(77, 240, 200, 0.88);
      box-shadow: 0 0 12px rgba(77, 240, 200, 0.35);
    }

    .dot.current {
      background: var(--yellow);
      box-shadow: 0 0 12px rgba(255, 209, 102, 0.5);
    }

    #controls {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 15px 12px;
      font-size: 15px;
      font-weight: 850;
      color: #06110f;
      background: var(--accent);
      cursor: pointer;
    }

    button.secondary {
      background: var(--soft);
      color: var(--text);
    }

    button.danger {
      background: var(--danger);
      color: white;
    }

    button.ready {
      background: var(--accent);
      color: #06110f;
      box-shadow: 0 0 22px rgba(77, 240, 200, 0.4);
    }

    button.almost {
      background: var(--yellow);
      color: #161008;
    }

    button.notReady {
      background: var(--bad);
      color: rgba(255,255,255,0.72);
    }

    button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    #thumbStrip {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 174px;
      z-index: 17;
      display: none;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .thumb {
      flex: 0 0 54px;
      height: 42px;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      position: relative;
    }

    .thumb canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .thumb span {
      position: absolute;
      left: 4px;
      top: 2px;
      color: white;
      font-size: 10px;
      font-weight: 900;
      text-shadow: 0 1px 5px black;
    }

    canvas.hiddenCanvas {
      display: none;
    }
  </style>
</head>

<body>
  <div id="app">
    <video id="video" autoplay playsinline muted></video>

    <div id="viewer"></div>

    <div id="aimLayer">
      <div id="targetRing"></div>
      <div id="currentDot"></div>
      <div id="arrowGuide">Alinea el punto con la diana</div>
    </div>

    <div id="hud">
      <div id="titleRow">
        <div id="title">360Cam</div>
        <div id="counter">0 / 26</div>
      </div>
      <div id="status">Pulsa “Cámara”. Después haremos 26 fotos guiadas.</div>
      <div id="step">Esperando cámara</div>
      <div id="metrics">Yaw — · Pitch —</div>
    </div>

    <div id="thumbStrip"></div>

    <div id="progressMap">
      <div id="dots"></div>
    </div>

    <div id="controls">
      <button id="cameraBtn">Cámara</button>
      <button id="captureBtn" class="notReady" disabled>Capturar</button>
      <button id="sphereBtn" class="secondary" disabled>Crear esfera</button>
      <button id="linkBtn" class="secondary" disabled>Generar link</button>
      <button id="copyBtn" class="secondary" disabled>Copiar link</button>
      <button id="resetBtn" class="danger">Reiniciar</button>
    </div>

    <canvas id="workCanvas" class="hiddenCanvas"></canvas>
    <canvas id="panoCanvas" class="hiddenCanvas" width="3072" height="1536"></canvas>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.160.0";
    import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://rdoivmucgucouauyqdos.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkb2l2bXVjZ3Vjb3VhdXlxZG9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA0NTczMjAsImV4cCI6MjA2NjAzMzMyMH0.UHIUOocHPfo65YCL7hK1wGYV4M8EaDSNrS89ZyNIBDU";
    const SUPABASE_BUCKET = "naojaguar-360cam";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const video = document.getElementById("video");
    const viewer = document.getElementById("viewer");

    const statusEl = document.getElementById("status");
    const stepEl = document.getElementById("step");
    const counterEl = document.getElementById("counter");
    const metricsEl = document.getElementById("metrics");

    const cameraBtn = document.getElementById("cameraBtn");
    const captureBtn = document.getElementById("captureBtn");
    const sphereBtn = document.getElementById("sphereBtn");
    const linkBtn = document.getElementById("linkBtn");
    const copyBtn = document.getElementById("copyBtn");
    const resetBtn = document.getElementById("resetBtn");

    const aimLayer = document.getElementById("aimLayer");
    const currentDot = document.getElementById("currentDot");
    const arrowGuide = document.getElementById("arrowGuide");

    const progressMap = document.getElementById("progressMap");
    const dotsEl = document.getElementById("dots");
    const thumbStrip = document.getElementById("thumbStrip");

    const workCanvas = document.getElementById("workCanvas");
    const workCtx = workCanvas.getContext("2d");

    const panoCanvas = document.getElementById("panoCanvas");
    const panoCtx = panoCanvas.getContext("2d");

    let stream = null;
    let lastShareUrl = "";

    let absoluteYaw = 0;
    let absolutePitch = 0;
    let absoluteRoll = 0;

    let baseYaw = null;
    let relativeYaw = 0;
    let relativePitch = 0;

    let hasOrientation = false;
    let currentIndex = 0;
    let photos = [];

    let renderer = null;
    let scene = null;
    let camera3d = null;
    let controls = null;
    let texture = null;
    let animationId = null;

    const ALIGN_READY_DEG = 8;
    const ALIGN_ALMOST_DEG = 18;

    const targets = buildTargets();

    function buildTargets() {
      const arr = [];

      for (let i = 0; i < 8; i++) {
        arr.push({
          ring: "Horizonte",
          yaw: i * 45,
          pitch: 0,
          label: "Foto " + (i + 1) + "/26: horizonte · gira cada 45°"
        });
      }

      for (let i = 0; i < 8; i++) {
        arr.push({
          ring: "Arriba",
          yaw: i * 45,
          pitch: 35,
          label: "Foto " + (i + 9) + "/26: inclina hacia arriba · gira cada 45°"
        });
      }

      for (let i = 0; i < 8; i++) {
        arr.push({
          ring: "Abajo",
          yaw: i * 45,
          pitch: -35,
          label: "Foto " + (i + 17) + "/26: inclina hacia abajo · gira cada 45°"
        });
      }

      arr.push({
        ring: "Cielo",
        yaw: 0,
        pitch: 75,
        label: "Foto 25/26: vuelve al frente y apunta al cielo"
      });

      arr.push({
        ring: "Suelo",
        yaw: 0,
        pitch: -75,
        label: "Foto 26/26: vuelve al frente y apunta al suelo"
      });

      return arr;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setStep(text) {
      stepEl.textContent = text;
    }

    function normalizeDeg(deg) {
      return ((deg % 360) + 360) % 360;
    }

    function shortestAngleDiff(target, current) {
      let diff = normalizeDeg(target) - normalizeDeg(current);
      if (diff > 180) diff -= 360;
      if (diff < -180) diff += 360;
      return diff;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function angleDistance(yawDiff, pitchDiff) {
      return Math.sqrt(yawDiff * yawDiff + pitchDiff * pitchDiff);
    }

    async function requestOrientationPermission() {
      hasOrientation = false;

      try {
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const permission = await DeviceOrientationEvent.requestPermission();

          if (permission !== "granted") {
            setStatus("Permiso de orientación denegado. Activa Movimiento y orientación en Safari.");
            return false;
          }
        }

        window.removeEventListener("deviceorientation", handleOrientation, true);
        window.removeEventListener("deviceorientationabsolute", handleOrientation, true);

        window.addEventListener("deviceorientation", handleOrientation, true);
        window.addEventListener("deviceorientationabsolute", handleOrientation, true);

        hasOrientation = true;
        return true;
      } catch (error) {
        console.warn("Orientación no disponible:", error);
        hasOrientation = false;
        return false;
      }
    }

    function handleOrientation(event) {
      let heading = null;

      if (typeof event.webkitCompassHeading === "number") {
        heading = event.webkitCompassHeading;
      }

      if (heading === null && typeof event.alpha === "number") {
        heading = 360 - event.alpha;
      }

      if (heading === null) return;

      absoluteYaw = normalizeDeg(heading);

      if (typeof event.beta === "number") {
        absolutePitch = clamp(event.beta - 90, -85, 85);
      }

      if (typeof event.gamma === "number") {
        absoluteRoll = event.gamma;
      }

      if (baseYaw === null) {
        baseYaw = absoluteYaw;
      }

      relativeYaw = normalizeDeg(absoluteYaw - baseYaw);
      relativePitch = absolutePitch;

      updateAimUI();
    }

    async function startCamera() {
      try {
        disposeViewer();

        const orientationOk = await requestOrientationPermission();

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        baseYaw = absoluteYaw || 0;
        relativeYaw = 0;
        relativePitch = absolutePitch || 0;

        currentIndex = 0;
        photos = [];
        lastShareUrl = "";

        createProgressDots();
        createThumbs();

        cameraBtn.disabled = true;
        captureBtn.disabled = false;
        sphereBtn.disabled = true;
        linkBtn.disabled = true;
        copyBtn.disabled = true;

        linkBtn.textContent = "Generar link";

        aimLayer.style.display = "block";
        progressMap.style.display = "block";
        thumbStrip.style.display = "flex";

        setStatus(
          orientationOk
            ? "Cámara activa. Alinea el punto amarillo con la diana."
            : "Cámara activa, pero no hay datos de orientación. Revisa permisos de movimiento."
        );

        updateStepText();
        updateAimUI();

        setTimeout(() => {
          if (hasOrientation && absoluteYaw === 0 && absolutePitch === 0) {
            setStatus("No recibo datos del giroscopio. En iPhone revisa Ajustes > Safari > Movimiento y orientación.");
          }
        }, 2500);

      } catch (error) {
        console.error(error);
        setStatus("No se pudo abrir la cámara. Revisa permisos y que la web esté en HTTPS.");
        setStep("Error de cámara");
      }
    }

    function updateStepText() {
      const target = targets[currentIndex];
      if (!target) return;

      counterEl.textContent = currentIndex + " / 26";
      setStep(target.label);
    }

    function createProgressDots() {
      dotsEl.innerHTML = "";

      for (let i = 0; i < targets.length; i++) {
        const dot = document.createElement("div");
        dot.className = "dot";
        dotsEl.appendChild(dot);
      }

      updateProgressDots();
    }

    function updateProgressDots() {
      const dots = Array.from(document.querySelectorAll(".dot"));

      dots.forEach((dot, i) => {
        dot.classList.remove("done", "current");

        if (i < currentIndex) {
          dot.classList.add("done");
        } else if (i === currentIndex) {
          dot.classList.add("current");
        }
      });

      counterEl.textContent = Math.min(currentIndex, 26) + " / 26";
    }

    function createThumbs() {
      thumbStrip.innerHTML = "";

      for (let i = 0; i < targets.length; i++) {
        const wrap = document.createElement("div");
        wrap.className = "thumb";

        const label = document.createElement("span");
        label.textContent = i + 1;

        const canvas = document.createElement("canvas");
        canvas.width = 160;
        canvas.height = 120;

        wrap.appendChild(canvas);
        wrap.appendChild(label);
        thumbStrip.appendChild(wrap);
      }
    }

    function updateAimUI() {
      const target = targets[currentIndex];
      if (!target) return;

      const yawDiff = shortestAngleDiff(target.yaw, relativeYaw);
      const pitchDiff = target.pitch - relativePitch;
      const dist = angleDistance(yawDiff, pitchDiff);

      const scale = 4.2;
      const maxMove = 135;

      const dotX = clamp(-yawDiff * scale, -maxMove, maxMove);
      const dotY = clamp(pitchDiff * scale, -maxMove, maxMove);

      currentDot.style.transform = `translate(calc(-50% + ${dotX}px), calc(-50% + ${dotY}px))`;

      metricsEl.textContent =
        "Yaw " + Math.round(relativeYaw) +
        "° → " + target.yaw +
        "° · Pitch " + Math.round(relativePitch) +
        "° → " + target.pitch + "°";

      arrowGuide.textContent = getGuideText(yawDiff, pitchDiff, dist);

      captureBtn.classList.remove("ready", "almost", "notReady");

      if (dist <= ALIGN_READY_DEG) {
        captureBtn.classList.add("ready");
        captureBtn.disabled = false;
        captureBtn.textContent = "✓ Capturar foto " + (currentIndex + 1);
      } else if (dist <= ALIGN_ALMOST_DEG) {
        captureBtn.classList.add("almost");
        captureBtn.disabled = false;
        captureBtn.textContent = "Casi · ajustar";
      } else {
        captureBtn.classList.add("notReady");
        captureBtn.disabled = false;
        captureBtn.textContent = "Alinea para capturar";
      }
    }

    function getGuideText(yawDiff, pitchDiff, dist) {
      if (dist <= ALIGN_READY_DEG) return "✓ Posición correcta";

      const parts = [];

      if (Math.abs(yawDiff) > 8) {
        parts.push(yawDiff > 0 ? "gira a la derecha →" : "gira a la izquierda ←");
      }

      if (Math.abs(pitchDiff) > 8) {
        parts.push(pitchDiff > 0 ? "inclina arriba ↑" : "inclina abajo ↓");
      }

      return parts.length ? parts.join(" · ") : "Ajuste fino";
    }

    function capturePhoto() {
      const target = targets[currentIndex];
      if (!target) return;

      const yawDiff = shortestAngleDiff(target.yaw, relativeYaw);
      const pitchDiff = target.pitch - relativePitch;
      const dist = angleDistance(yawDiff, pitchDiff);

      if (dist > ALIGN_ALMOST_DEG) {
        setStatus("Aún estás lejos de la diana. Sigue la flecha.");
        return;
      }

      if (!video.videoWidth || !video.videoHeight) {
        setStatus("La cámara aún no está lista. Espera un segundo.");
        return;
      }

      workCanvas.width = video.videoWidth;
      workCanvas.height = video.videoHeight;

      workCtx.drawImage(video, 0, 0, workCanvas.width, workCanvas.height);

      const img = new Image();

      img.onload = () => {
        photos[currentIndex] = {
          image: img,
          targetYaw: target.yaw,
          targetPitch: target.pitch,
          realYaw: relativeYaw,
          realPitch: relativePitch,
          ring: target.ring
        };

        drawThumb(currentIndex, img);

        currentIndex++;
        updateProgressDots();

        if (currentIndex < targets.length) {
          updateStepText();
          setStatus("Foto guardada. Busca la siguiente diana.");
          updateAimUI();
        } else {
          finishCapture();
        }
      };

      img.src = workCanvas.toDataURL("image/jpeg", 0.9);
    }

    function finishCapture() {
      captureBtn.disabled = true;
      captureBtn.textContent = "Completado";
      captureBtn.classList.remove("ready", "almost", "notReady");
      captureBtn.classList.add("secondary");

      sphereBtn.disabled = false;

      aimLayer.style.display = "none";

      counterEl.textContent = "26 / 26";
      setStatus("Ya tienes las 26 fotos. Pulsa “Crear esfera”.");
      setStep("Captura completa");
    }

    function drawThumb(index, img) {
      const wrap = thumbStrip.children[index];
      if (!wrap) return;

      const canvas = wrap.querySelector("canvas");
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#05070a";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cover = coverRect(img.width, img.height, canvas.width, canvas.height);

      ctx.drawImage(
        img,
        cover.sx,
        cover.sy,
        cover.sw,
        cover.sh,
        0,
        0,
        canvas.width,
        canvas.height
      );

      ctx.fillStyle = "rgba(77, 240, 200, 0.12)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      wrap.style.borderColor = "rgba(77, 240, 200, 0.8)";
      wrap.style.boxShadow = "0 0 12px rgba(77, 240, 200, 0.25)";
      wrap.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    }

    function coverRect(srcW, srcH, dstW, dstH) {
      const srcAspect = srcW / srcH;
      const dstAspect = dstW / dstH;

      let sx, sy, sw, sh;

      if (srcAspect > dstAspect) {
        sh = srcH;
        sw = sh * dstAspect;
        sx = (srcW - sw) / 2;
        sy = 0;
      } else {
        sw = srcW;
        sh = sw / dstAspect;
        sx = 0;
        sy = (srcH - sh) / 2;
      }

      return { sx, sy, sw, sh };
    }

    function createPanoramaFromPhotos() {
      const W = panoCanvas.width;
      const H = panoCanvas.height;

      panoCtx.fillStyle = "#05070a";
      panoCtx.fillRect(0, 0, W, H);

      drawFullRow(24, 0, H * 0.18);
      drawRingRow(8, 8, H * 0.14, H * 0.28);
      drawRingRow(0, 8, H * 0.36, H * 0.28);
      drawRingRow(16, 8, H * 0.58, H * 0.28);
      drawFullRow(25, H * 0.82, H * 0.18);

      applySoftBlends();
      applySubtleGrid();
    }

    function drawRingRow(startIndex, count, y, h) {
      const W = panoCanvas.width;
      const segmentW = W / count;

      for (let i = 0; i < count; i++) {
        const photo = photos[startIndex + i];
        if (!photo) continue;

        const x = i * segmentW;

        drawImageCoverToRectSoft(
          panoCtx,
          photo.image,
          x - segmentW * 0.08,
          y,
          segmentW * 1.16,
          h,
          0.18
        );

        if (i === 0) {
          drawImageCoverToRectSoft(
            panoCtx,
            photo.image,
            W - segmentW * 0.08,
            y,
            segmentW * 0.16,
            h,
            0.18
          );
        }

        if (i === count - 1) {
          drawImageCoverToRectSoft(
            panoCtx,
            photo.image,
            -segmentW * 0.08,
            y,
            segmentW * 0.16,
            h,
            0.18
          );
        }
      }
    }

    function drawFullRow(index, y, h) {
      const photo = photos[index];
      if (!photo) return;

      drawImageCoverToRectSoft(
        panoCtx,
        photo.image,
        0,
        y,
        panoCanvas.width,
        h,
        0.08
      );
    }

    function drawImageCoverToRectSoft(ctx, img, x, y, w, h, fadeRatio) {
      const temp = document.createElement("canvas");
      temp.width = Math.max(2, Math.round(w));
      temp.height = Math.max(2, Math.round(h));

      const tctx = temp.getContext("2d");
      const cover = coverRect(img.width, img.height, temp.width, temp.height);

      tctx.drawImage(
        img,
        cover.sx,
        cover.sy,
        cover.sw,
        cover.sh,
        0,
        0,
        temp.width,
        temp.height
      );

      const mask = tctx.createLinearGradient(0, 0, temp.width, 0);
      const f = fadeRatio;

      mask.addColorStop(0, "rgba(255,255,255,0)");
      mask.addColorStop(f, "rgba(255,255,255,1)");
      mask.addColorStop(1 - f, "rgba(255,255,255,1)");
      mask.addColorStop(1, "rgba(255,255,255,0)");

      tctx.globalCompositeOperation = "destination-in";
      tctx.fillStyle = mask;
      tctx.fillRect(0, 0, temp.width, temp.height);

      const vmask = tctx.createLinearGradient(0, 0, 0, temp.height);
      vmask.addColorStop(0, "rgba(255,255,255,0.25)");
      vmask.addColorStop(0.16, "rgba(255,255,255,1)");
      vmask.addColorStop(0.84, "rgba(255,255,255,1)");
      vmask.addColorStop(1, "rgba(255,255,255,0.25)");

      tctx.globalCompositeOperation = "destination-in";
      tctx.fillStyle = vmask;
      tctx.fillRect(0, 0, temp.width, temp.height);
      tctx.globalCompositeOperation = "source-over";

      ctx.drawImage(temp, x, y, w, h);
    }

    function applySoftBlends() {
      const W = panoCanvas.width;
      const H = panoCanvas.height;

      const topFade = panoCtx.createLinearGradient(0, 0, 0, H * 0.24);
      topFade.addColorStop(0, "rgba(5,7,10,0.16)");
      topFade.addColorStop(1, "rgba(5,7,10,0)");
      panoCtx.fillStyle = topFade;
      panoCtx.fillRect(0, 0, W, H * 0.24);

      const bottomFade = panoCtx.createLinearGradient(0, H * 0.76, 0, H);
      bottomFade.addColorStop(0, "rgba(5,7,10,0)");
      bottomFade.addColorStop(1, "rgba(5,7,10,0.16)");
      panoCtx.fillStyle = bottomFade;
      panoCtx.fillRect(0, H * 0.76, W, H * 0.24);
    }

    function applySubtleGrid() {
      const W = panoCanvas.width;
      const H = panoCanvas.height;

      panoCtx.strokeStyle = "rgba(77,240,200,0.07)";
      panoCtx.lineWidth = 2;

      for (let x = 0; x <= W; x += W / 24) {
        panoCtx.beginPath();
        panoCtx.moveTo(x, 0);
        panoCtx.lineTo(x, H);
        panoCtx.stroke();
      }

      for (let y = 0; y <= H; y += H / 12) {
        panoCtx.beginPath();
        panoCtx.moveTo(0, y);
        panoCtx.lineTo(W, y);
        panoCtx.stroke();
      }
    }

    function createFloatingSphere() {
      if (photos.length < 26) {
        setStatus("Faltan fotos. Captura las 26 antes de crear la esfera.");
        return;
      }

      createPanoramaFromPhotos();
      disposeViewer();

      video.style.display = "none";
      viewer.style.display = "block";
      aimLayer.style.display = "none";
      progressMap.style.display = "none";
      thumbStrip.style.display = "none";

      setStatus("Esfera creada. Arrastra para girarla y pellizca para hacer zoom.");
      setStep("Esfera flotante 3D");

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x05070a);

      camera3d = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );

      camera3d.position.set(0, 0, 4.2);

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false
      });

      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      viewer.innerHTML = "";
      viewer.appendChild(renderer.domElement);

      texture = new THREE.CanvasTexture(panoCanvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.needsUpdate = true;

      const geometry = new THREE.SphereGeometry(1.35, 128, 64);
      const material = new THREE.MeshBasicMaterial({ map: texture });
      const sphere = new THREE.Mesh(geometry, material);
      scene.add(sphere);

      const ringGeometry = new THREE.TorusGeometry(1.39, 0.007, 16, 180);
      const ringMaterial = new THREE.MeshBasicMaterial({
        color: 0x4df0c8,
        transparent: true,
        opacity: 0.28
      });

      const ring = new THREE.Mesh(ringGeometry, ringMaterial);
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);

      controls = new OrbitControls(camera3d, renderer.domElement);
      controls.enableZoom = true;
      controls.enablePan = false;
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.rotateSpeed = 0.55;
      controls.zoomSpeed = 0.9;
      controls.minDistance = 2.0;
      controls.maxDistance = 8.5;
      controls.target.set(0, 0, 0);

      animate();

      window.addEventListener("resize", onResize);

      sphereBtn.disabled = true;
      captureBtn.disabled = true;
      cameraBtn.disabled = true;
      linkBtn.disabled = false;
      copyBtn.disabled = !lastShareUrl;
    }

    async function generateShareLink() {
      try {
        linkBtn.disabled = true;
        copyBtn.disabled = true;
        linkBtn.textContent = "Subiendo...";
        setStatus("Subiendo esfera a Supabase...");

        const blob = await new Promise((resolve) => {
          panoCanvas.toBlob(resolve, "image/jpeg", 0.9);
        });

        if (!blob) {
          throw new Error("No se pudo generar la imagen panorámica.");
        }

        const id = crypto.randomUUID();
        const filePath = `spheres/${id}.jpg`;

        const uploadResult = await supabase.storage
          .from(SUPABASE_BUCKET)
          .upload(filePath, blob, {
            contentType: "image/jpeg",
            upsert: false
          });

        if (uploadResult.error) {
          throw uploadResult.error;
        }

        const publicUrlResult = supabase.storage
          .from(SUPABASE_BUCKET)
          .getPublicUrl(filePath);

        const publicUrl = publicUrlResult.data.publicUrl;

        const insertResult = await supabase
          .from("spheres")
          .insert({
            id,
            title: "360Cam sphere",
            storage_path: filePath,
            public_url: publicUrl
          });

        if (insertResult.error) {
          throw insertResult.error;
        }

        const shareUrl = `${window.location.origin}/view.html?id=${id}`;
        lastShareUrl = shareUrl;

        setStatus("Link generado. Puedes copiarlo o compartirlo.");
        setStep(shareUrl);

        linkBtn.textContent = "Compartir";
        linkBtn.disabled = false;
        copyBtn.disabled = false;

        await copyLinkToClipboard(shareUrl);
      } catch (error) {
        console.error(error);
        setStatus("Error generando link: " + error.message);
        linkBtn.disabled = false;
        copyBtn.disabled = !lastShareUrl;
        linkBtn.textContent = lastShareUrl ? "Compartir" : "Generar link";
      }
    }

    async function copyLinkToClipboard(url) {
      try {
        if (navigator.clipboard) {
          await navigator.clipboard.writeText(url);
          setStatus("Link generado y copiado al portapapeles.");
          return true;
        }
      } catch (error) {
        console.warn("No se pudo copiar automáticamente:", error);
      }

      return false;
    }

    async function shareCurrentSphereLink() {
      if (!lastShareUrl) {
        await generateShareLink();
        return;
      }

      if (navigator.share) {
        try {
          await navigator.share({
            title: "Mi esfera 360",
            text: "Mira esta esfera 360 creada con 360Cam.",
            url: lastShareUrl
          });
          return;
        } catch (error) {
          console.warn("Compartir cancelado o fallido:", error);
        }
      }

      await copyCurrentSphereLink();
    }

    async function copyCurrentSphereLink() {
      if (!lastShareUrl) {
        setStatus("Todavía no hay link generado.");
        return;
      }

      const copied = await copyLinkToClipboard(lastShareUrl);

      if (copied) {
        setStatus("Link copiado.");
      } else {
        setStatus("No se pudo copiar automáticamente. Mantén pulsado el link de arriba para copiarlo.");
      }

      setStep(lastShareUrl);
    }

    function animate() {
      animationId = requestAnimationFrame(animate);

      if (controls) controls.update();

      if (renderer && scene && camera3d) {
        renderer.render(scene, camera3d);
      }
    }

    function onResize() {
      if (!renderer || !camera3d) return;

      camera3d.aspect = window.innerWidth / window.innerHeight;
      camera3d.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function disposeViewer() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      window.removeEventListener("resize", onResize);

      if (texture) {
        texture.dispose();
        texture = null;
      }

      if (renderer) {
        renderer.dispose();
        renderer = null;
      }

      viewer.innerHTML = "";

      scene = null;
      camera3d = null;
      controls = null;
    }

    function resetApp() {
      disposeViewer();

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      video.style.display = "block";
      viewer.style.display = "none";

      aimLayer.style.display = "none";
      progressMap.style.display = "none";
      thumbStrip.style.display = "none";

      absoluteYaw = 0;
      absolutePitch = 0;
      absoluteRoll = 0;
      baseYaw = null;
      relativeYaw = 0;
      relativePitch = 0;

      currentIndex = 0;
      photos = [];
      lastShareUrl = "";

      cameraBtn.disabled = false;
      captureBtn.disabled = true;
      sphereBtn.disabled = true;
      linkBtn.disabled = true;
      copyBtn.disabled = true;

      linkBtn.textContent = "Generar link";
      copyBtn.textContent = "Copiar link";

      captureBtn.textContent = "Capturar";
      captureBtn.classList.remove("ready", "almost", "secondary");
      captureBtn.classList.add("notReady");

      panoCtx.clearRect(0, 0, panoCanvas.width, panoCanvas.height);

      counterEl.textContent = "0 / 26";
      setStatus("Pulsa “Cámara”. Después haremos 26 fotos guiadas.");
      setStep("Esperando cámara");
      metricsEl.textContent = "Yaw — · Pitch —";
    }

    cameraBtn.addEventListener("click", startCamera);
    captureBtn.addEventListener("click", capturePhoto);
    sphereBtn.addEventListener("click", createFloatingSphere);

    linkBtn.addEventListener("click", () => {
      if (lastShareUrl) {
        shareCurrentSphereLink();
      } else {
        generateShareLink();
      }
    });

    copyBtn.addEventListener("click", copyCurrentSphereLink);
    resetBtn.addEventListener("click", resetApp);
  </script>
</body>
</html>
