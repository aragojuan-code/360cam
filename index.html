<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>360Cam - NaoJaguar</title>

  <style>
    :root {
      --bg: #0f141b;
      --panel: rgba(15, 20, 27, 0.84);
      --text: #f3f7fb;
      --muted: #9aa7b3;
      --accent: #4df0c8;
      --danger: #ff5c7a;
      --soft: #263241;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #05070a;
      overflow: hidden;
    }

    video,
    #viewer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    #viewer {
      display: none;
      background: radial-gradient(circle at center, #16212c 0%, #05070a 65%);
    }

    #hud {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 10;
      padding: 14px;
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }

    #title {
      font-weight: 850;
      font-size: 17px;
      margin-bottom: 4px;
    }

    #status {
      font-size: 14px;
      line-height: 1.35;
      color: var(--muted);
    }

    #step {
      margin-top: 8px;
      font-size: 15px;
      font-weight: 800;
      color: var(--accent);
    }

    #controls {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 15px 12px;
      font-size: 15px;
      font-weight: 850;
      color: #06110f;
      background: var(--accent);
      cursor: pointer;
    }

    button.secondary {
      background: var(--soft);
      color: var(--text);
    }

    button.danger {
      background: var(--danger);
      color: white;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #captureRing {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 180px;
      height: 180px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 3px solid rgba(77, 240, 200, 0.75);
      box-shadow:
        0 0 30px rgba(77, 240, 200, 0.35),
        inset 0 0 30px rgba(77, 240, 200, 0.15);
      z-index: 5;
      pointer-events: none;
    }

    #captureRing::before,
    #captureRing::after {
      content: "";
      position: absolute;
      background: rgba(77, 240, 200, 0.9);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    #captureRing::before {
      width: 2px;
      height: 54px;
    }

    #captureRing::after {
      width: 54px;
      height: 2px;
    }

    #thumbs {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 112px;
      z-index: 9;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      pointer-events: none;
    }

    .thumb {
      height: 58px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      overflow: hidden;
      position: relative;
    }

    .thumb canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .thumb span {
      position: absolute;
      left: 5px;
      top: 3px;
      font-size: 11px;
      font-weight: 800;
      color: white;
      text-shadow: 0 1px 5px black;
    }

    canvas.hiddenCanvas {
      display: none;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="app">
    <video id="video" autoplay playsinline muted></video>

    <div id="viewer"></div>

    <div id="captureRing"></div>

    <div id="hud">
      <div id="title">360Cam</div>
      <div id="status">Pulsa “Cámara”. Después haremos 6 fotos guiadas.</div>
      <div id="step">Esperando cámara</div>
    </div>

    <div id="thumbs">
      <div class="thumb"><span>1</span><canvas width="220" height="160"></canvas></div>
      <div class="thumb"><span>2</span><canvas width="220" height="160"></canvas></div>
      <div class="thumb"><span>3</span><canvas width="220" height="160"></canvas></div>
      <div class="thumb"><span>4</span><canvas width="220" height="160"></canvas></div>
      <div class="thumb"><span>5</span><canvas width="220" height="160"></canvas></div>
      <div class="thumb"><span>6</span><canvas width="220" height="160"></canvas></div>
    </div>

    <div id="controls">
      <button id="cameraBtn">Cámara</button>
      <button id="captureBtn" class="secondary" disabled>Foto 1</button>
      <button id="sphereBtn" class="secondary" disabled>Crear esfera</button>
      <button id="resetBtn" class="danger">Reiniciar</button>
    </div>

    <canvas id="workCanvas" class="hiddenCanvas"></canvas>
    <canvas id="panoCanvas" class="hiddenCanvas" width="2048" height="1024"></canvas>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.160.0";
    import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const video = document.getElementById("video");
    const viewer = document.getElementById("viewer");
    const statusEl = document.getElementById("status");
    const stepEl = document.getElementById("step");

    const cameraBtn = document.getElementById("cameraBtn");
    const captureBtn = document.getElementById("captureBtn");
    const sphereBtn = document.getElementById("sphereBtn");
    const resetBtn = document.getElementById("resetBtn");

    const captureRing = document.getElementById("captureRing");

    const thumbs = Array.from(document.querySelectorAll(".thumb canvas"));

    const workCanvas = document.getElementById("workCanvas");
    const workCtx = workCanvas.getContext("2d");

    const panoCanvas = document.getElementById("panoCanvas");
    const panoCtx = panoCanvas.getContext("2d");

    let stream = null;
    let currentStep = 0;
    let photos = [];

    let renderer = null;
    let scene = null;
    let camera3d = null;
    let controls = null;
    let texture = null;
    let animationId = null;

    const instructions = [
      "Foto 1/6: frente. Teléfono vertical.",
      "Foto 2/6: gira 90° a la derecha. Teléfono vertical.",
      "Foto 3/6: gira otros 90°. Estás mirando hacia atrás.",
      "Foto 4/6: gira otros 90°. Teléfono vertical.",
      "Foto 5/6: vuelve al ángulo de la foto 1 y apunta al cielo.",
      "Foto 6/6: mismo ángulo de la foto 1 y apunta al suelo."
    ];

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setStep(text) {
      stepEl.textContent = text;
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        cameraBtn.disabled = true;
        captureBtn.disabled = false;
        sphereBtn.disabled = true;

        currentStep = 0;
        photos = [];

        captureBtn.textContent = "Foto 1";

        setStatus("Cámara activa. Sigue las instrucciones y captura las 6 fotos.");
        setStep(instructions[currentStep]);
      } catch (error) {
        console.error(error);
        setStatus("No se pudo abrir la cámara. Revisa permisos y que la web esté en HTTPS.");
        setStep("Error de cámara");
      }
    }

    function capturePhoto() {
      if (!video.videoWidth || !video.videoHeight) {
        setStatus("La cámara aún no está lista. Espera un segundo.");
        return;
      }

      workCanvas.width = video.videoWidth;
      workCanvas.height = video.videoHeight;
      workCtx.drawImage(video, 0, 0, workCanvas.width, workCanvas.height);

      const img = new Image();
      img.onload = () => {
        photos[currentStep] = img;
        drawThumb(currentStep, img);

        currentStep++;

        if (currentStep < 6) {
          captureBtn.textContent = "Foto " + (currentStep + 1);
          setStep(instructions[currentStep]);
          setStatus("Foto guardada. Colócate para la siguiente toma.");
        } else {
          captureBtn.disabled = true;
          sphereBtn.disabled = false;
          captureBtn.textContent = "Completado";
          setStatus("Ya tienes las 6 fotos. Pulsa “Crear esfera”.");
          setStep("Captura completa");
        }
      };

      img.src = workCanvas.toDataURL("image/jpeg", 0.92);
    }

    function drawThumb(index, img) {
      const canvas = thumbs[index];
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#05070a";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cover = coverRect(img.width, img.height, canvas.width, canvas.height);

      ctx.drawImage(
        img,
        cover.sx, cover.sy, cover.sw, cover.sh,
        0, 0, canvas.width, canvas.height
      );

      ctx.fillStyle = "rgba(77, 240, 200, 0.12)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function coverRect(srcW, srcH, dstW, dstH) {
      const srcAspect = srcW / srcH;
      const dstAspect = dstW / dstH;

      let sx, sy, sw, sh;

      if (srcAspect > dstAspect) {
        sh = srcH;
        sw = sh * dstAspect;
        sx = (srcW - sw) / 2;
        sy = 0;
      } else {
        sw = srcW;
        sh = sw / dstAspect;
        sx = 0;
        sy = (srcH - sh) / 2;
      }

      return { sx, sy, sw, sh };
    }

    function createPanoramaFromSixPhotos() {
      const W = panoCanvas.width;
      const H = panoCanvas.height;

      panoCtx.fillStyle = "#05070a";
      panoCtx.fillRect(0, 0, W, H);

      const sideY = H * 0.18;
      const sideH = H * 0.64;
      const sideW = W / 4;

      // Fotos 1-4: alrededor del horizonte.
      for (let i = 0; i < 4; i++) {
        const img = photos[i];
        const targetX = i * sideW;

        drawImageCoverToRect(
          panoCtx,
          img,
          targetX,
          sideY,
          sideW + 2,
          sideH
        );
      }

      // Foto 5: cielo. Se extiende en la zona superior.
      drawImageCoverToRect(
        panoCtx,
        photos[4],
        0,
        0,
        W,
        H * 0.32
      );

      // Foto 6: suelo. Se extiende en la zona inferior.
      drawImageCoverToRect(
        panoCtx,
        photos[5],
        0,
        H * 0.68,
        W,
        H * 0.32
      );

      // Fundidos suaves para mezclar cielo/horizonte/suelo.
      const topFade = panoCtx.createLinearGradient(0, H * 0.18, 0, H * 0.36);
      topFade.addColorStop(0, "rgba(5,7,10,0.0)");
      topFade.addColorStop(1, "rgba(5,7,10,0.24)");
      panoCtx.fillStyle = topFade;
      panoCtx.fillRect(0, H * 0.18, W, H * 0.18);

      const bottomFade = panoCtx.createLinearGradient(0, H * 0.64, 0, H * 0.82);
      bottomFade.addColorStop(0, "rgba(5,7,10,0.22)");
      bottomFade.addColorStop(1, "rgba(5,7,10,0.0)");
      panoCtx.fillStyle = bottomFade;
      panoCtx.fillRect(0, H * 0.64, W, H * 0.18);

      // Líneas muy suaves de esfera para que se entienda el objeto 3D.
      panoCtx.strokeStyle = "rgba(77,240,200,0.10)";
      panoCtx.lineWidth = 2;

      for (let x = 0; x <= W; x += W / 16) {
        panoCtx.beginPath();
        panoCtx.moveTo(x, 0);
        panoCtx.lineTo(x, H);
        panoCtx.stroke();
      }

      for (let y = 0; y <= H; y += H / 8) {
        panoCtx.beginPath();
        panoCtx.moveTo(0, y);
        panoCtx.lineTo(W, y);
        panoCtx.stroke();
      }
    }

    function drawImageCoverToRect(ctx, img, x, y, w, h) {
      const cover = coverRect(img.width, img.height, w, h);

      ctx.drawImage(
        img,
        cover.sx,
        cover.sy,
        cover.sw,
        cover.sh,
        x,
        y,
        w,
        h
      );
    }

    function createFloatingSphere() {
      if (photos.length < 6) {
        setStatus("Faltan fotos. Captura las 6 antes de crear la esfera.");
        return;
      }

      createPanoramaFromSixPhotos();
      disposeViewer();

      video.style.display = "none";
      viewer.style.display = "block";
      captureRing.classList.add("hidden");

      setStatus("Esfera creada. Pellizca para zoom y arrastra para girarla.");
      setStep("Esfera flotante 3D");

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x05070a);

      camera3d = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );

      camera3d.position.set(0, 0, 4.2);

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false
      });

      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      viewer.innerHTML = "";
      viewer.appendChild(renderer.domElement);

      texture = new THREE.CanvasTexture(panoCanvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.needsUpdate = true;

      const geometry = new THREE.SphereGeometry(1.35, 96, 48);

      const material = new THREE.MeshBasicMaterial({
        map: texture
      });

      const sphere = new THREE.Mesh(geometry, material);
      scene.add(sphere);

      // Aro ecuatorial suave para reforzar que es una esfera flotando.
      const ringGeometry = new THREE.TorusGeometry(1.39, 0.008, 16, 160);
      const ringMaterial = new THREE.MeshBasicMaterial({
        color: 0x4df0c8,
        transparent: true,
        opacity: 0.36
      });
      const ring = new THREE.Mesh(ringGeometry, ringMaterial);
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);

      // Luz ambiental no necesaria para MeshBasicMaterial,
      // pero queda preparada si luego usamos materiales brillantes.
      const ambient = new THREE.AmbientLight(0xffffff, 1);
      scene.add(ambient);

      controls = new OrbitControls(camera3d, renderer.domElement);
      controls.enableZoom = true;
      controls.enablePan = false;
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.rotateSpeed = 0.55;
      controls.zoomSpeed = 0.9;
      controls.minDistance = 2.1;
      controls.maxDistance = 8.5;
      controls.target.set(0, 0, 0);

      animate();

      window.addEventListener("resize", onResize);

      sphereBtn.disabled = true;
    }

    function animate() {
      animationId = requestAnimationFrame(animate);

      if (controls) controls.update();

      if (renderer && scene && camera3d) {
        renderer.render(scene, camera3d);
      }
    }

    function onResize() {
      if (!renderer || !camera3d) return;

      camera3d.aspect = window.innerWidth / window.innerHeight;
      camera3d.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function disposeViewer() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      window.removeEventListener("resize", onResize);

      if (texture) {
        texture.dispose();
        texture = null;
      }

      if (renderer) {
        renderer.dispose();
        renderer = null;
      }

      viewer.innerHTML = "";

      scene = null;
      camera3d = null;
      controls = null;
    }

    function resetApp() {
      disposeViewer();

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      video.style.display = "block";
      viewer.style.display = "none";
      captureRing.classList.remove("hidden");

      currentStep = 0;
      photos = [];

      cameraBtn.disabled = false;
      captureBtn.disabled = true;
      sphereBtn.disabled = true;

      captureBtn.textContent = "Foto 1";

      for (const canvas of thumbs) {
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      panoCtx.clearRect(0, 0, panoCanvas.width, panoCanvas.height);

      setStatus("Pulsa “Cámara”. Después haremos 6 fotos guiadas.");
      setStep("Esperando cámara");
    }

    cameraBtn.addEventListener("click", startCamera);
    captureBtn.addEventListener("click", capturePhoto);
    sphereBtn.addEventListener("click", createFloatingSphere);
    resetBtn.addEventListener("click", resetApp);
  </script>
</body>
</html>
